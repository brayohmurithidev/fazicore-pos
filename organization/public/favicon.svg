<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark rounded background -->
  <rect width="32" height="32" rx="7" fill="#111827"/>

  <!-- Building / org icon -->
  <!-- Base platform -->
  <rect x="5" y="24" width="22" height="2" rx="1" fill="white"/>

  <!-- Main building body -->
  <rect x="9" y="13" width="14" height="11" rx="1" fill="none" stroke="white" stroke-width="1.5"/>

  <!-- Roof / roof peak -->
  <polyline points="7,14 16,7 25,14" fill="none" stroke="white" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Door -->
  <rect x="13.5" y="19" width="5" height="5" rx="0.8" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.2"/>

  <!-- Blue accent dot (chimney/flag) -->
