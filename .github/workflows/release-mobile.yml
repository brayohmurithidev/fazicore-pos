name: Release Mobile

# ── Triggers ──────────────────────────────────────────────────────────────────
# 1. Push a tag:  git tag mobile-v1.0.0 && git push origin mobile-v1.0.0
# 2. Manual run:  Actions → Release Mobile → Run workflow → enter version
on:
  push:
    tags:
      - 'mobile-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0) — must match version in mobile/pubspec.yaml'
        required: true

permissions:
  contents: write

jobs:
  # ── Tests (runs first; blocks both build jobs on failure) ──────────────────
  test:
    name: Flutter tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Flutter pub get
        working-directory: mobile
        run: flutter pub get

      - name: Analyze
        working-directory: mobile
        run: flutter analyze

      - name: Test
        working-directory: mobile
        run: flutter test

  # ── Android APK + AAB ───────────────────────────────────────────────────────
  android:
    name: Android (APK + AAB)
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=mobile-v${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Flutter pub get
        working-directory: mobile
        run: flutter pub get

      # Write key.properties + decode keystore only when secrets are present.
      # Without them, build.gradle.kts falls back to the debug signing config.
      - name: Check Android signing secrets
        id: android_sign
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "sign=true" >> "$GITHUB_OUTPUT"
          else
            echo "sign=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Decode keystore + write key.properties
        if: steps.android_sign.outputs.sign == 'true'
        working-directory: mobile/android
        env:
          ANDROID_KEYSTORE_BASE64:    ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD:  ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS:          ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD:       ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > app/fazipos.jks
          cat > key.properties << EOF
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=fazipos.jks
          EOF

      - name: Build APK
        working-directory: mobile
        run: flutter build apk --release

      - name: Build AAB
        working-directory: mobile
        run: flutter build appbundle --release

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: FaziPOS Mobile ${{ steps.tag.outputs.value }}
          draft: true
          fail_on_unmatched_files: true
          files: |
            mobile/build/app/outputs/flutter-apk/app-release.apk
            mobile/build/app/outputs/bundle/release/app-release.aab

  # ── iOS IPA (unsigned — sideload / TestFlight via manual upload) ────────────
  ios:
    name: iOS (IPA)
    needs: test
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=mobile-v${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Flutter pub get
        working-directory: mobile
        run: flutter pub get

      - name: Pod install
        working-directory: mobile/ios
        run: pod install

      - name: Build iOS (no codesign)
        working-directory: mobile
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          mkdir -p mobile/build/ios/ipa/Payload
          cp -r mobile/build/ios/iphoneos/Runner.app mobile/build/ios/ipa/Payload/
          cd mobile/build/ios/ipa
          zip -r ../fazipos-ios.ipa Payload/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: FaziPOS Mobile ${{ steps.tag.outputs.value }}
          draft: true
          fail_on_unmatched_files: true
          files: mobile/build/ios/fazipos-ios.ipa
