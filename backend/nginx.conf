# Host-level Nginx config for fazistore-api.fazilabs.com
# Drop this in /etc/nginx/sites-available/fazistore-api
# then: sudo ln -s /etc/nginx/sites-available/fazistore-api /etc/nginx/sites-enabled/
# then: sudo nginx -t && sudo systemctl reload nginx
#
# After reloading, run: sudo certbot --nginx -d fazistore-api.fazilabs.com

server {
    listen 80;
    server_name fazistore-api.fazilabs.com;

    client_max_body_size 20M;

    # FastAPI
    location /api/ {
        proxy_pass         http://127.0.0.1:8100;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /health {
        proxy_pass       http://127.0.0.1:8100;
        proxy_set_header Host $host;
    }

    # MinIO public object storage (bucket "fazipos")
    location /fazipos/ {
        proxy_pass       http://127.0.0.1:9200/fazipos/;
        proxy_set_header Host $host;
        proxy_hide_header x-amz-id-2;
        proxy_hide_header x-amz-request-id;
        proxy_hide_header Set-Cookie;
        proxy_ignore_headers Set-Cookie;
    }
}
