services:
  api:
    image: ${API_IMAGE}
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8100:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@shared-postgres:5432/${POSTGRES_DB}
      # DATABASE_URL_APP re-enable after fazipos_app migration grants are confirmed applied
      REDIS_URL: redis://shared-redis:6379/0
      MINIO_ENDPOINT: http://shared-minio:9000
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT}
      MINIO_SECURE: "false"
    restart: unless-stopped

  worker:
    image: ${API_IMAGE}
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app worker --loglevel=info
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@shared-postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://shared-redis:6379/0
    restart: unless-stopped
  
networks:
  default:
    external: true
    name: shared-network
