name: fazipos_mobile
description: FaziCore POS — mobile companion (iOS & Android)
publish_to: "none"
version: 0.1.1+2

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  dio: ^5.7.0
  go_router: ^14.6.2
  flutter_secure_storage: ^9.2.2
  intl: ^0.19.0
  fl_chart: ^1.2.0
  drift: ^2.33.0
  sqlite3_flutter_libs: ^0.6.0+eol
  path: ^1.9.1
  path_provider: ^2.1.5
  connectivity_plus: ^7.1.1
  uuid: ^4.5.3
  drift_flutter: ^0.3.0
  mobile_scanner: ^7.2.0
  print_bluetooth_thermal: ^1.2.2
  esc_pos_utils_plus: ^2.0.4
  permission_handler: ^12.0.3
  share_plus: ^12.0.2
  image_picker: ^1.2.2
  image_cropper: ^12.2.1
  webview_flutter: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.33.0
  build_runner: ^2.15.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: launcher_icon
  ios: true
  image_path: assets/icon/app_icon.png
  adaptive_icon_background: "#1E293B"
  adaptive_icon_foreground: assets/icon/app_icon.png
  min_sdk_android: 21
  remove_alpha_ios: true

flutter_native_splash:
  color: "#1E293B"
  image: assets/icon/app_icon.png
  color_dark: "#1E293B"
  image_dark: assets/icon/app_icon.png
  android_12:
    color: "#1E293B"
    image: assets/icon/app_icon.png
    icon_background_color: "#1E293B"
  ios: true
  android: true
  web: false

flutter:
  uses-material-design: true
  assets:
    - assets/safaricom/
    - assets/icon/
  fonts:
    - family: Rubik
      fonts:
        - asset: assets/fonts/Rubik.ttf
