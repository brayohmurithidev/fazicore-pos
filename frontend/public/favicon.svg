<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark rounded background -->
  <rect width="32" height="32" rx="7" fill="#111827"/>

  <!-- Monitor screen body -->
  <rect x="4.5" y="6.5" width="23" height="14" rx="2" fill="none" stroke="white" stroke-width="1.6"/>

  <!-- Screen inner glow accent line (receipt/POS feel) -->
  <line x1="8" y1="11" x2="16" y2="11" stroke="#60A5FA" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="8" y1="14" x2="13" y2="14" stroke="rgba(255,255,255,0.45)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="8" y1="17" x2="15" y2="17" stroke="rgba(255,255,255,0.3)" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Cart/register dot accent top-right of screen -->
  <circle cx="21.5" cy="11" r="1.8" fill="#3B82F6"/>
  <circle cx="21.5" cy="11" r="0.8" fill="white"/>

  <!-- Monitor neck -->
  <line x1="16" y1="20.5" x2="16" y2="24.5" stroke="white" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Monitor base -->
  <line x1="11.5" y1="24.5" x2="20.5" y2="24.5" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
</svg>
