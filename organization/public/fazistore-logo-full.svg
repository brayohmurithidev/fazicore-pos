<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <!-- Graphite gradient for the icon -->
    <linearGradient id="graphiteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A4A4A"/>
      <stop offset="50%" style="stop-color:#333333"/>
      <stop offset="100%" style="stop-color:#1E1E1E"/>
    </linearGradient>
    <!-- Amber accent gradient -->
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFBF00"/>
      <stop offset="100%" style="stop-color:#E8A800"/>
    </linearGradient>
    <!-- Warm amber glow -->
    <linearGradient id="amberGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD54F"/>
      <stop offset="100%" style="stop-color:#FFBF00"/>
    </linearGradient>
    <!-- Icon shadow -->
    <filter id="iconShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#1E1E1E" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- === ICON: Stylized POS terminal with barcode/inventory motif === -->
  <g transform="translate(30, 20)" filter="url(#iconShadow)">
    <!-- POS Terminal body -->
    <rect x="8" y="8" width="120" height="145" rx="16" ry="16" fill="url(#graphiteGrad)"/>
    
    <!-- Screen area -->
    <rect x="22" y="22" width="92" height="62" rx="8" ry="8" fill="#F5F0E8" opacity="0.95"/>
    
    <!-- Screen content: mini barcode lines in graphite -->
    <rect x="32" y="34" width="4" height="24" rx="1" fill="#333333" opacity="0.7"/>
    <rect x="39" y="34" width="2" height="24" rx="1" fill="#333333" opacity="0.5"/>
    <rect x="44" y="34" width="5" height="24" rx="1" fill="#333333" opacity="0.8"/>
    <rect x="52" y="34" width="3" height="24" rx="1" fill="#333333" opacity="0.6"/>
    <rect x="58" y="34" width="2" height="24" rx="1" fill="#333333" opacity="0.4"/>
    <rect x="63" y="34" width="6" height="24" rx="1" fill="#333333" opacity="0.7"/>
    <rect x="72" y="34" width="3" height="24" rx="1" fill="#333333" opacity="0.55"/>
    <rect x="78" y="34" width="2" height="24" rx="1" fill="#333333" opacity="0.45"/>
    <rect x="83" y="34" width="5" height="24" rx="1" fill="#333333" opacity="0.75"/>
    <rect x="91" y="34" width="3" height="24" rx="1" fill="#333333" opacity="0.5"/>
    <rect x="97" y="34" width="4" height="24" rx="1" fill="#333333" opacity="0.65"/>
    
    <!-- Screen: inventory trend line in amber -->
    <polyline points="32,68 45,60 55,65 68,52 80,58 95,48 101,54" 
              stroke="#FFBF00" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Chart dot accent -->
    <circle cx="68" cy="52" r="2.5" fill="#FFD54F"/>
    
    <!-- Keypad dots (3x3 grid) -->
    <circle cx="42" cy="102" r="5" fill="#F5F0E8" opacity="0.2"/>
    <circle cx="62" cy="102" r="5" fill="#F5F0E8" opacity="0.2"/>
    <circle cx="82" cy="102" r="5" fill="#F5F0E8" opacity="0.2"/>
    <circle cx="42" cy="120" r="5" fill="#F5F0E8" opacity="0.2"/>
    <circle cx="62" cy="120" r="5" fill="#F5F0E8" opacity="0.2"/>
    <circle cx="82" cy="120" r="5" fill="#F5F0E8" opacity="0.2"/>
    <!-- Bottom action button in amber -->
    <rect x="34" y="133" width="68" height="10" rx="5" fill="url(#amberGrad)" opacity="0.9"/>
    
    <!-- Receipt paper coming out the top -->
    <g>
      <path d="M38,8 L38,-12 Q38,-16 42,-16 L94,-16 Q98,-16 98,-12 L98,8" fill="#FAFAF5" stroke="#D5D0C8" stroke-width="0.8"/>
      <!-- Receipt torn edge -->
      <path d="M38,-16 L42,-13 L46,-16 L50,-13 L54,-16 L58,-13 L62,-16 L66,-13 L70,-16 L74,-13 L78,-16 L82,-13 L86,-16 L90,-13 L94,-16 L98,-16" fill="#FAFAF5" stroke="none"/>
      <!-- Receipt text lines -->
      <line x1="48" y1="-8" x2="88" y2="-8" stroke="#C8C3BB" stroke-width="1.2"/>
      <line x1="48" y1="-3" x2="78" y2="-3" stroke="#C8C3BB" stroke-width="1.2"/>
      <line x1="48" y1="2" x2="84" y2="2" stroke="#C8C3BB" stroke-width="1.2"/>
      <!-- Checkmark on receipt in amber -->
      <polyline points="44,-5 47,-2 53,-10" stroke="#E8A800" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- === WORDMARK === -->
  <g transform="translate(180, 55)">
    <!-- "fazi" in graphite, "store" in amber -->
    <text font-family="'Trebuchet MS', 'Segoe UI', Tahoma, sans-serif" font-size="62" font-weight="800" letter-spacing="-1">
      <tspan fill="#2A2A2A">fazi</tspan><tspan fill="url(#amberGrad)">store</tspan>
    </text>
  </g>

  <!-- Tagline -->
  <g transform="translate(183, 90)">
    <text font-family="'Trebuchet MS', 'Segoe UI', Tahoma, sans-serif" font-size="15.5" fill="#6B6560" letter-spacing="4.5" font-weight="500">
      POINT OF SALE &amp; INVENTORY
    </text>
  </g>

  <!-- Accent bar under tagline — amber + graphite -->
  <rect x="183" y="100" width="52" height="3.5" rx="1.75" fill="url(#amberGrad)"/>
  <rect x="240" y="100" width="18" height="3.5" rx="1.75" fill="#4A4A4A" opacity="0.3"/>

  <!-- Small decorative grid dots (inventory motif) bottom-right -->
  <g opacity="0.1" fill="#4A4A4A">
    <circle cx="520" cy="155" r="2.2"/>
    <circle cx="532" cy="155" r="2.2"/>
    <circle cx="544" cy="155" r="2.2"/>
    <circle cx="556" cy="155" r="2.2"/>
    <circle cx="520" cy="167" r="2.2"/>
    <circle cx="532" cy="167" r="2.2"/>
    <circle cx="544" cy="167" r="2.2"/>
    <circle cx="556" cy="167" r="2.2"/>
    <circle cx="520" cy="179" r="2.2"/>
    <circle cx="532" cy="179" r="2.2"/>
    <circle cx="544" cy="179" r="2.2"/>
    <circle cx="556" cy="179" r="2.2"/>
  </g>
</svg>