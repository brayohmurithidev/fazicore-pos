name: Release Desktop

# ── Triggers ──────────────────────────────────────────────────────────────────
# 1. Push a tag:  git tag v1.2.0 && git push origin v1.2.0
# 2. Manual run:  Actions → Release Desktop → Run workflow → enter version
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release — must match version in frontend/src-tauri/tauri.conf.json (e.g. 1.2.0)'
        required: true

permissions:
  contents: write   # needed to create GitHub Releases

jobs:
  build-release:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false   # don't cancel the other platform if one fails
      matrix:
        include:
          # ── macOS universal binary (Intel + Apple Silicon) ─────────────────
          - platform: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            build-args: --target universal-apple-darwin

          # ── Windows x64 ────────────────────────────────────────────────────
          - platform: windows-latest
            rust-targets: ''
            build-args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      # ── Source ──────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Compute release tag ─────────────────────────────────────────────────
      # On tag push → use the pushed tag.
      # On manual dispatch → construct from the version input.
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=v${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      # ── Toolchain ───────────────────────────────────────────────────────────
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust build cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri -> target

      # ── Linux system deps (not needed here, kept as reference if added later)

      # ── Frontend ────────────────────────────────────────────────────────────
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      # Write the production .env so Vite bakes the live API URL into the bundle.
      # Override via GitHub repository variables if the URL ever changes.
      - name: Write production .env
        shell: bash
        run: |
          cat > frontend/.env.production << 'EOF'
          VITE_API_URL=${{ vars.VITE_API_URL || 'https://fazistore-api.fazilabs.com' }}
          VITE_MINIO_PUBLIC_URL=${{ vars.VITE_MINIO_PUBLIC_URL || 'https://fazistore-api.fazilabs.com/' }}
          EOF

      # ── Bundle a fixed WebView2 runtime (Windows only) ───────────────────────
      # The app ships its own modern Chromium so it renders correctly regardless
      # of the (possibly ancient) WebView2 on the client machine. tauri.conf.json
      # points bundle.windows.webviewInstallMode at ./webview2-runtime.
      #
      # Set WEBVIEW2_FIXED_URL (repo Variable or Secret — either works) to the
      # official Microsoft "Fixed Version" x64 .cab download link:
      #   https://developer.microsoft.com/microsoft-edge/webview2/  → Fixed Version → x64
      - name: Fetch fixed WebView2 runtime
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          WEBVIEW2_FIXED_URL: ${{ secrets.WEBVIEW2_FIXED_URL || vars.WEBVIEW2_FIXED_URL }}
        run: |
          $url = $env:WEBVIEW2_FIXED_URL
          if ([string]::IsNullOrWhiteSpace($url)) {
            Write-Error "WEBVIEW2_FIXED_URL is not set. Add the Microsoft WebView2 Fixed Version x64 .cab link under Settings -> Secrets and variables -> Actions (Variables or Secrets tab)."
            exit 1
          }
          $dest = "frontend/src-tauri/webview2-runtime"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Write-Host "Downloading WebView2 Fixed Version runtime…"
          Invoke-WebRequest -Uri $url -OutFile webview2.cab
          # The CAB lays files out under a versioned folder; expand, then flatten it.
          expand webview2.cab -F:* $dest | Out-Null
          $inner = Get-ChildItem -Path $dest -Directory |
                   Where-Object { $_.Name -like 'Microsoft.WebView2.FixedVersionRuntime*' } |
                   Select-Object -First 1
          if ($inner) {
            Move-Item -Path (Join-Path $inner.FullName '*') -Destination $dest -Force
            Remove-Item $inner.FullName -Recurse -Force
          }
          if (-not (Test-Path (Join-Path $dest 'msedgewebview2.exe'))) {
            Write-Error "msedgewebview2.exe not found after extraction — check WEBVIEW2_FIXED_URL points to the x64 Fixed Version CAB."
            exit 1
          }
          Write-Host "Fixed runtime ready ($([math]::Round((Get-ChildItem $dest -Recurse | Measure-Object Length -Sum).Sum / 1MB)) MB)."

      # ── Detect whether Apple signing secrets are configured ─────────────────
      # Passing empty strings to tauri-action still triggers the keychain import
      # and fails. Only expose the APPLE_* vars when the certificate is present.
      - name: Check Apple signing
        id: apple
        if: runner.os == 'macOS'
        shell: bash
        env:
          CERT: ${{ secrets.APPLE_CERTIFICATE }}
        run: |
          if [ -n "$CERT" ]; then
            echo "sign=true" >> "$GITHUB_OUTPUT"
          else
            echo "sign=false" >> "$GITHUB_OUTPUT"
          fi

      # ── Build + publish (macOS — with signing when certificate is present) ──
      - name: Build & release (macOS, signed)
        if: runner.os == 'macOS' && steps.apple.outputs.sign == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN:                       ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE:                  ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD:         ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY:             ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID:                           ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD:                     ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID:                      ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY:          ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: frontend
          tagName:      ${{ steps.tag.outputs.value }}
          releaseName:  'FaziPOS v__VERSION__'
          releaseBody:  |
            ## FaziPOS __VERSION__

            | Platform | File |
            |----------|------|
            | macOS (Intel + Apple Silicon) | `FaziPOS_*_universal.dmg` |
            | Windows 64-bit installer | `FaziPOS_*_x64-setup.exe` |
            | Windows 64-bit MSI | `FaziPOS_*_x64_en-US.msi` |

            > The app notifies users automatically when this release is published.
          releaseDraft: true
          prerelease: false
          updaterJsonKeepUniversal: true
          args: ${{ matrix.build-args }}

      # ── Build + publish (macOS — unsigned, no Apple certificate) ────────────
      - name: Build & release (macOS, unsigned)
        if: runner.os == 'macOS' && steps.apple.outputs.sign != 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN:                       ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY:          ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: frontend
          tagName:      ${{ steps.tag.outputs.value }}
          releaseName:  'FaziPOS v__VERSION__'
          releaseBody:  |
            ## FaziPOS __VERSION__

            | Platform | File |
            |----------|------|
            | macOS (Intel + Apple Silicon) | `FaziPOS_*_universal.dmg` |
            | Windows 64-bit installer | `FaziPOS_*_x64-setup.exe` |
            | Windows 64-bit MSI | `FaziPOS_*_x64_en-US.msi` |

            > The app notifies users automatically when this release is published.
          releaseDraft: true
          prerelease: false
          updaterJsonKeepUniversal: true
          args: ${{ matrix.build-args }}

      # ── Build + publish (Windows) ────────────────────────────────────────────
      - name: Build & release (Windows)
        if: runner.os == 'Windows'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN:                       ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY:          ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: frontend
          tagName:      ${{ steps.tag.outputs.value }}
          releaseName:  'FaziPOS v__VERSION__'
          releaseBody:  |
            ## FaziPOS __VERSION__

            | Platform | File |
            |----------|------|
            | macOS (Intel + Apple Silicon) | `FaziPOS_*_universal.dmg` |
            | Windows 64-bit installer | `FaziPOS_*_x64-setup.exe` |
            | Windows 64-bit MSI | `FaziPOS_*_x64_en-US.msi` |

            > The app notifies users automatically when this release is published.
          releaseDraft: true
          prerelease: false
          updaterJsonKeepUniversal: true
          args: ${{ matrix.build-args }}
